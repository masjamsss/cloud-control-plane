# ccp-app static server (unprivileged nginx image → listens on :8080 as non-root).
# The external reverse proxy terminates TLS and forwards here; this server only ever
# speaks plain HTTP inside the container network.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip the text assets the proxy forwards (it may also compress; harmless).
    gzip              on;
    gzip_types        text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;

    # Container-local liveness for THIS service's healthcheck (not user-facing).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Vite emits content-hashed files under /assets/ — safe to cache hard-forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: unknown paths serve index.html so client-side routes
    # (createBrowserRouter) resolve on a hard reload / deep link. index.html itself
    # is never cached, so a redeploy is picked up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files  $uri $uri/ /index.html;
    }
}
