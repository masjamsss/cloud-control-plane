  /projects/{id}/drift:   # drift-portal spec WI-2 — token-lane ingestion + role-projected serve
    put:
      summary: >-
        The token-authed CI drift-report upload (the SAME upload token PUT /:id/data mints —
        Authorization: Bearer <tokenId>.<secret>, never a session). Stages the classified ccp.drift/v1
        envelope as the next immutable VERSION and advances the served pointer in the SAME transaction —
        UNLIKE project data there is no separate activation step (telemetry describes reality and can
        trigger nothing by itself). FAIL-CLOSED pipeline: CCP_DRIFT armed check (409 DRIFT_DISARMED,
        before any token work) then per-tokenId rate limit before the argon2id verify then project state
        (trusted/ready, not archived) then explicit size cap (4 MiB) then tolerant zod validation (class is
        a free string, never a wire enum) plus a projectId-binds-to-:id check then duplicate-address /
        duplicate-finding-key refusal (422 VALIDATION_FAILED) then a server-side redaction re-run over every
        changedAttrs live/code/liveJson/codeJson AND every sweep finding's name/actor prose (the classifier's
        own sensitive masking is not a complete secret barrier) then an envelopeDigest dedupe (an identical
        re-upload/CI retry is a 200 no-op). The envelope additionally carries an OPTIONAL top-level `sweep`
        section (OOB provisioning spec §3.1/§3.2, docs/superpowers/specs/2026-07-20-ccp-oob-provisioning-import.md)
        — the unmanaged-resource findings feed; absent ⇒ byte-identical to a producer that has not upgraded.
        Two findings sharing a key (arn, or tfType+liveId when arn is null) ⇒ 422 (the A8 doctrine applied to
        the finding keyspace). A secret-battery hit on a finding's importPayload HCL text strips the WHOLE
        payload server-side (drop, never mask — masking would corrupt HCL that must apply byte-for-byte) and
        sets payloadWithheldReason; the finding itself still stores and serves. counts gains `unmanaged`
        (= sweep.totalFindings, 0 when absent); the pointer row gains `unmanagedCount` to match. Audit:
        drift-report-upload, on the TARGET project's chain.
      security: []
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schema, projectId, environment, capturedAt, runId, commit, cadenceHours, planExitCode, report]
              description: 'the ccp.drift/v1 envelope (scripts/drift/publish_envelope.py) — classify.py''s classification.json wrapped verbatim under report; sweep is the OOB provisioning spec''s additive section'
              properties:
                schema: { type: string, const: ccp.drift/v1 }
                projectId: { type: string }
                environment: { type: string }
                capturedAt: { type: string }
                runId: { type: string }
                commit: { type: string }
                cadenceHours: { type: number }
                planExitCode: { type: integer, enum: [0, 2], description: '0 = verified clean · 2 = drift — exit 1 never publishes' }
                report:
                  type: object
                  description: 'classify.py --out-json output, byte-for-byte: meta, counts, verdicts, absorbed, invisible_to_plan'
                  properties:
                    verdicts: { type: array, items: { $ref: '#/components/schemas/DriftVerdict' } }
                sweep: { $ref: '#/components/schemas/DriftSweep', description: 'ADDITIVE, optional (OOB provisioning spec §3.1) — absent ⇒ today''s ingest is byte-identical' }
      responses:
        '200':
          description: 'Deduplicated — an identical envelope (by digest) is already staged as this version, a CI-retry no-op'
          content:
            application/json:
              schema:
                type: object
                required: [version, deduplicated]
                properties: { version: { type: integer }, deduplicated: { type: boolean, const: true } }
        '201':
          description: 'Staged as the next version; the served pointer advances immediately (no separate activation)'
          content:
            application/json:
              schema: { type: object, required: [version], properties: { version: { type: integer } } }
        '401': { description: UPLOAD_TOKEN_INVALID, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '404': { description: Not found }
        '409':
          description: 'DRIFT_DISARMED (CCP_DRIFT unset) | STATE_CONFLICT (project not trusted/ready, or archived)'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '413': { description: UPLOAD_TOO_LARGE, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '422': { description: 'VALIDATION_FAILED — malformed body, projectId mismatch, duplicate verdict address, or duplicate finding key (sweep.findings)', content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '429': { $ref: '#/components/responses/E429' }
    get:
      summary: >-
        Drift status + role-projected verdicts (session, bound to the TARGET project — the same
        serve-endpoint rule as manifests/inventory/blocks). connected:false when CCP_DRIFT is disarmed OR
        no report was ever staged for this project (never a 409/403 — presence is honesty, values follow
        duty). Role-projected server-side: a requester sees presence, taxonomy, and attribute PATHS only;
        approver/lead additionally see the full post-redaction row — attribute values, securityHits
        evidence, and recommendation/neverDo prose. A stored envelope that fails schema validation on read
        serves connected:true, report:null (fail closed, logged, never a partial render). report.sweep (OOB
        provisioning spec §3.3) is null when the envelope carried no sweep section, else an object whose
        summary fields (counts.unmanaged, totalFindings, capturedAt, coverage) are visible to every role and
        whose findings[] rows are role-projected: requester sees {class, tfType, name, service, securityFamily,
        importPayloadPresent} only; approver/lead additionally see arn, liveId, actor, the importPayload body,
        and payloadWithheldReason.
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DriftStatus' } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { $ref: '#/components/responses/E403' }
        '404': { description: 'No such project, or archived' }
  /projects/{id}/drift/proposals/{digest}/submit:   # drift-portal spec §4.3, WI-6 — the ONLY door into a drift request (extended for flavor 'import', OOB spec §6/WI-S6; extended for flavor 'restore', L29 register 0009, 2026-07-20-drift-restore-tranche.md §2.5)
    post:
      summary: >-
        Submit a generated drift-fix proposal as a normal portal request — the ONLY way a
        system-drift-* op ever reaches the ladder (POST /requests refuses them outright,
        DRIFT_PROPOSAL_REQUIRED). Session + membership on the TARGET project; role: adopt ⇒ any
        bound member, revert, import, AND restore ⇒ approver/lead only (revert re-imposes code
        onto live security posture; import adopts an unknown actor's resource into legitimacy;
        restore re-creates infrastructure — the same posture-judgment tier). Server-side, in
        order: CCP_DRIFT armed → flavor import ADDITIONALLY requires CCP_DRIFT_IMPORT=1,
        flavor restore ADDITIONALLY requires CCP_DRIFT_RESTORE=1 (else 409 DRIFT_DISARMED,
        flavor-naming reason — same code, distinct reason, no new taxonomy entry) → the proposal
        (+ every batched alsoDigests proposal, SAME-FLAVOR-only: adopt+adopt, import+import, or
        restore+restore, never mixed) exists, is 'open', and lastSeenReportVersion equals the
        served pointer's version (else 409 DRIFT_PROPOSAL_STALE) → eligibility RE-DERIVED from
        the STORED report — verdicts for adopt/revert/restore, sweep.findings (by arn, or
        tfType+liveId when arn is null) for import — never the proposal's own claim (§8
        enforcement point 2; any mismatch ⇒ 422 DRIFT_NOT_ADOPTABLE — this is what makes
        security-posture drift, and a since-flagged creation-security finding, structurally
        impossible to adopt/import even via a forged/relabeled proposal row) → the request is
        built entirely server-side from the pinned skeleton(s)/CURRENT finding — client input is
        justification + schedule + alsoDigests ONLY, params are never client-supplied → the
        normal submit internals (freeze, submit rate limit, [L2,L3] ladder derivation,
        feasibility snapshot, audit). alsoDigests batches additional ADOPT proposals, additional
        IMPORT proposals, or additional RESTORE proposals (never mixed flavors in one request),
        into one change-set (§7 blast-radius mitigation extended to import and restore); a
        revert proposal always submits alone. Every submitted proposal is marked
        submitted{requestId} in the SAME atomic transact as the request. Audit: request-submit
        (standard) + drift-proposal-submitted per digest; the request's timeline gains an origin
        event. Import's pinned params shape is {finding, importPayload, diff:null, proposalDigest, reportVersion}
        — finding is the CURRENT stored sweep row just
        re-verified; importPayload is the ORIGINAL, digest-pinned {address, targetFile,
        importBlock, skeletonHcl} bytes from the stored proposal body (never re-derived from the
        current finding). Restore's pinned params shape rides the SAME {attrs, verdicts, diff, proposalDigest, reportVersion}
        shape as adopt/revert verbatim — attrs is always [] and
        diff is always null (L29, register 0009, 2026-07-20-drift-restore-tranche.md §2.2/§2.5).
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/digest' }, { $ref: '#/components/parameters/client' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [justification, schedule]
              properties: { justification: { type: string, minLength: 10 },
                schedule: { type: object, description: "{kind:'now'} | {kind:'window', at, endAt?} — validated identically to SubmitDraft.schedule (0024 §2.1 V1-V6)" },
                alsoDigests: { type: array, items: { type: string, pattern: '^[0-9a-f]{64}$' }, maxItems: 99, description: 'same-flavor batch only (adopt+adopt, import+import, or restore+restore); a revert proposal must never carry this' } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { description: 'PROJECT_SCOPE (not bound to the target project) | FORBIDDEN_ROLE (a requester submitting a revert, an import, or a restore)', content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '404': { description: 'No such project/proposal, or the project is archived' }
        '409':
          description: 'DRIFT_DISARMED (CCP_DRIFT unset, or — flavor-specific — CCP_DRIFT_IMPORT/CCP_DRIFT_RESTORE unset) | DRIFT_PROPOSAL_STALE (superseded / not from the latest report / already submitted) | CHAIN_CONTENTION'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '422':
          description: 'VALIDATION_FAILED | DRIFT_NOT_ADOPTABLE (re-derived eligibility refused — §8 enforcement point 2) | SCHEDULE_INVALID/TOO_SOON/TOO_FAR'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '423': { $ref: '#/components/responses/E423' }
        '429': { $ref: '#/components/responses/E429' }
  /projects/{id}/drift/security/{digest}/legitimize:   # C2 — the legitimize front door (2026-07-20 drift-audit-fixes plan, spec addendum A6)
    post:
      summary: >-
        From a security-posture drift row, converge code to a JUSTIFIED EMERGENCY change via a
        full-scrutiny engineer-tier request (system-drift-legitimize) — the alternative to REVERT
        (the submit endpoint above). Session + membership on the TARGET project; role
        approver/lead only (same tier as revert — it concerns live security posture). `:digest`
        must name an OPEN, FRESH, REVERT-flavored proposal (same staleness rules as submit; an
        adopt-flavored or unknown digest is 404 here). Eligibility RE-DERIVED from the STORED
        report: EVERY verdict on the row's addresses must be security-posture, else 422
        DRIFT_NOT_ADOPTABLE. Creates the request entirely server-side — op
        system-drift-legitimize, exposure engineer_only ⇒ status NEEDS_ENGINEER, the SAME [L2,L3]
        ladder + TOTP machinery; params pinned per the F1(a) shape
        {attrs, verdicts, diff:null, proposalDigest, reportVersion} as the engineer's evidence.
        The revert proposal row is deliberately NOT consumed (stays 'open') — both resolutions
        stay visible until the next clean run closes the loop. Fulfillment rides the existing
        engineer/manual-PR track (link-pr + the normal CI lane); no bundle/gate rule is added.
        Audit: drift-legitimize-requested.
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/digest' }, { $ref: '#/components/parameters/client' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [justification, schedule]
              properties: { justification: { type: string, minLength: 40, description: 'must cite the emergency (the UI provides the template with the CloudTrail-investigation duty) — a much higher bar than the normal submit''s minLength 10' },
                schedule: { type: object, description: "{kind:'now'} | {kind:'window', at, endAt?} — validated identically to SubmitDraft.schedule" } }
      responses:
        '201': { description: Created (a NEEDS_ENGINEER request), content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { description: 'PROJECT_SCOPE (not bound to the target project) | FORBIDDEN_ROLE (not approver/lead)', content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '404': { description: 'No such REVERT-flavored proposal at this digest, or the project is archived' }
        '409':
          description: 'DRIFT_DISARMED (CCP_DRIFT unset) | DRIFT_PROPOSAL_STALE (not open / not from the latest report) | CHAIN_CONTENTION'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '422':
          description: 'VALIDATION_FAILED | DRIFT_NOT_ADOPTABLE (re-derived eligibility failed — every verdict on these addresses must be security-posture) | SCHEDULE_INVALID/TOO_SOON/TOO_FAR'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '423': { $ref: '#/components/responses/E423' }
        '429': { $ref: '#/components/responses/E429' }
  /projects/{id}/drift/check:   # B1 — "Start drift check" (2026-07-20 drift-audit-fixes plan, spec addendum A7)
    post:
      summary: >-
        On-demand run of the estate drift workflow (the bundle-trigger pattern — the api NEVER
        runs terraform). Session + membership on the TARGET project; role LEAD OR ADMIN (the
        apply-route precedent — stricter than the adopt/revert/legitimize surface). Order: CCP_DRIFT
        armed → project gates → role → GLOBAL_FREEZE → the check lane armed
        (CCP_DRIFT_CHECK_CMD set, else 409 DRIFT_DISARMED naming it) → ONE IN-FLIGHT PER PROJECT
        (a concurrent call ⇒ 409 STATE_CONFLICT) → runs the operator's CCP_DRIFT_CHECK_CMD with
        env CCP_DRIFT_PROJECT=:id (wired by the operator to the estate workflow's existing
        workflow_dispatch, drift.yml:46). Responds 202 once dispatched regardless of the trigger
        command's own exit code (fire-and-forget; the outcome is captured in the audit `detail`,
        never surfaced as a 5xx) — the report only "lands" later, through the normal PUT publish.
        Audit: drift-check-requested.
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }]
      responses:
        '202':
          description: Dispatched — the report lands later through the normal PUT publish
          content: { application/json: { schema: { type: object, required: [requested, at], properties: { requested: { type: boolean, const: true }, at: { type: string } } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { description: 'PROJECT_SCOPE | DRIFT_CHECK_FORBIDDEN (not lead/admin)', content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '404': { description: 'No such project, or archived' }
        '409':
          description: 'DRIFT_DISARMED (CCP_DRIFT unset, OR CCP_DRIFT_CHECK_CMD unset — same code, distinct reason) | STATE_CONFLICT (already in flight for this project)'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
        '423': { $ref: '#/components/responses/E423' }
  /projects/{id}/drift/generate:   # B2 — "Fix the drift" refresh half (2026-07-20 drift-audit-fixes plan, spec addendum A7)
    post:
      summary: >-
        Exposes the §6.3 proposal-generation runner ON DEMAND — the SAME non-reentrant,
        queue-collapsing runner the PUT handler already fires automatically after every upload;
        idempotent via digests (re-running over unchanged drift produces zero new rows). Session +
        membership on the TARGET project; role LEAD OR ADMIN (same tier as the check button).
        Order: CCP_DRIFT armed → project gates → role → generation armed
        (CCP_DRIFT_PROPOSALS + CCP_DRIFT_GEN_CMD + CCP_GIT_REMOTE all set, else 409
        DRIFT_DISARMED naming them) → the served pointer must exist (else 409 STATE_CONFLICT —
        nothing to generate from) → audit, then schedules generation (fire-and-forget, never
        blocks this response). Deliberately NOT freeze-gated (unlike the check button) —
        generation only produces PROPOSAL rows, never a request; the same posture as the automatic
        post-upload trigger. Audit: drift-generation-requested.
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }]
      responses:
        '202':
          description: Scheduled
          content: { application/json: { schema: { type: object, required: [scheduled, reportVersion], properties: { scheduled: { type: boolean, const: true }, reportVersion: { type: integer } } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { description: 'PROJECT_SCOPE | DRIFT_GENERATE_FORBIDDEN (not lead/admin)', content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '404': { description: 'No such project, or archived' }
        '409':
          description: 'DRIFT_DISARMED (CCP_DRIFT unset, OR the three generation envs unset — same code, distinct reason) | STATE_CONFLICT (no report ever staged)'
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
  /projects/{id}/data/{version}/activate:
    post: { summary: 'Activate one staged version for serving (lead + isAdmin) — ALWAYS a two-admin envelope:
        proposes (202, kind project-data-activate); a second distinct admin''s ack points dataActive at the
        version (named audit event ''Activated project data for serving''). THE FIRST activation is the
        project''s GO-LIVE: on a status-trusted project the ack also flips status to ready (routable via
        x-ccp-project, valid as an account binding, listed in the switcher) and records `artifacts` from
        the server-computed digests of the activated version — no hand-typed digests; the pending change''s
        `after` discloses the whole effect to the acking admin. Only an ACTIVATED version is ever served. A
        registry write between propose and ack fails the ack with 409 STALE_PROPOSAL (version guard)',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' },
        { name: version, in: path, required: true, schema: {type: integer} }],
      responses: { '202': { description: PendingConfigChange created (§6 dual control), content: { application/json: {
          schema: { $ref: '#/components/schemas/PendingConfigChange' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' },
        '422': { $ref: '#/components/responses/E422' } } }
  /projects/{id}/archive:
    post: { summary: 'Archive a project (lead + isAdmin) — TIGHTENING, applies immediately with one admin:
        the project stops being routable/servable and refuses uploads + token mints; the registry row and
        audit history stay. Audit: project-archive',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      responses: { '200': { description: Archived },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' } } }
  /projects/{id}/unarchive:
    post: { summary: 'Unarchive (lead + isAdmin) — LOOSENING (restores access), so ALWAYS a two-admin envelope:
        proposes (202, kind project-unarchive); the second admin''s ack clears the archive block and restores
        routability (a ready project rejoins the known set)',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      responses: { '202': { description: PendingConfigChange created (§6 dual control), content: { application/json: {
          schema: { $ref: '#/components/schemas/PendingConfigChange' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' } } }
  /projects/{id}/manifests:
    get: { summary: 'Serve the project''s ACTIVE manifests (the runtime read that kills the app rebuild). The
        caller''s session must be bound to THE TARGET project (not merely the acting scope) — an account with
        no relationship to an estate can never read its data. Archived or never-activated → 404 (fail closed)',
      parameters: [{ $ref: '#/components/parameters/id' }],
      responses: { '200': { description: 'The active version''s manifest array (JSON)' },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: 'No project, or no active data' } } }
  /projects/{id}/inventory:
    get: { summary: 'Serve the project''s ACTIVE inventory (same target-binding + active-only rules as manifests)',
      parameters: [{ $ref: '#/components/parameters/id' }],
      responses: { '200': { description: 'The active version''s inventory (JSON)' },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: 'No project, or no active data' } } }
  /projects/{id}/blocks/{chunk}:
    get: { summary: 'Serve one block chunk of the ACTIVE version (chunk ''index'' = the address→chunk map).
        The chunk name is validated against the version''s STORED chunk list — never the filesystem',
      parameters: [{ $ref: '#/components/parameters/id' },
        { name: chunk, in: path, required: true, schema: {type: string} }],
      responses: { '200': { description: 'The chunk file (JSON)' },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: 'No project, no active data, or no such chunk' } } }
