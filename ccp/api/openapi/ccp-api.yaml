openapi: 3.1.0
info:
  title: ccp-api
  version: 2.0.0
  description: Authoritative Cloud Control Plane backend (Fork A1, ADR-0005). Actor is always the session; bodies never carry identity.
servers: [{ url: /v2 }]
security: [{ session: [] }]
components:
  securitySchemes:
    session: { type: apiKey, in: cookie, name: ccp_session,
      description: "Opaque 256-bit token, HttpOnly Secure SameSite=Lax; server stores sha256(token). Non-GET also requires X-Ccp-Client header. The acting scope is X-Ccp-Project (a registered, ready project id); absent -> the reserved control-plane scope '@control' (data-birth spec: a header-less client is an inert CONTROL-PLANE client -- auth + admin-global + the projects registry only, never an implicit estate). '@control' is never listed by GET /projects, never a valid account binding, and every estate-only surface (request submission/approval, catalog reads) refuses it with 403 CONTROL_SCOPE." }
  parameters:
    client: { name: X-Ccp-Client, in: header, required: true, schema: { type: string, const: ccp-spa } }
    id: { name: id, in: path, required: true, schema: { type: string } }
    cursor: { name: cursor, in: query, schema: { type: string } }
    digest: { name: digest, in: path, required: true, description: 'proposalDigest — sha256 hex (drift-portal spec §2.4)', schema: { type: string, pattern: '^[0-9a-f]{64}$' } }
  responses:
    E401: { description: No/expired/invalidated session, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
    E403: { description: Role/capability/SoD violation, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
    E409: { description: Conflict (double approval, stale state, chain contention), content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
    E422: { description: Validation/manifest/policy failure, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
    E423: { description: Locked (account lockout, global freeze), content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
    E429: { description: Rate limited (Retry-After set), content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
  schemas:
    Err: { type: object, required: [code, reason], properties: { code: { type: string }, reason: { type: string }, details: {} } }
    Role: { type: string, enum: [requester, approver, lead] }
    Risk: { type: string, enum: [LOW, MEDIUM, HIGH] }
    Account:   # public projection ONLY — credential material never serializes
      type: object
      required: [id, username, displayName, role, teamId, status, isAdmin]
      properties: { id: {type: string}, username: {type: string}, displayName: {type: string},
        role: {$ref: '#/components/schemas/Role'}, teamId: {type: string},
        status: {type: string, enum: [active, disabled]}, isAdmin: {type: boolean},
        projects: {type: array, items: {type: string}, description: "allowed-projects binding; '*' = all projects; a bare legacy row with neither roles nor projects is a member of nothing (fail closed, data-birth spec)"},
        mustChangePassword: {type: boolean}, totpEnrolled: {type: boolean},
        createdAt: {type: string, format: date-time}, createdBy: {type: string} }
    Team: { type: object, required: [id, name, serviceSlugs],
      properties: { id: {type: string}, name: {type: string}, serviceSlugs: {type: array, items: {type: string}} } }
    ApprovalPolicy: { type: object, required: [low, medium, high, deleteMin, version],
      properties: { low: {type: integer, minimum: 1, maximum: 5}, medium: {type: integer, minimum: 1, maximum: 5},
        high: {type: integer, minimum: 1, maximum: 5}, deleteMin: {type: integer, minimum: 1, maximum: 5},
        version: {type: integer} } }
    Approval: { type: object, required: [user, at], properties: { user: {type: string}, at: {type: string, format: date-time} } }
    RequestEvent: { type: object, required: [at, type, label],
      properties: { at: {type: string}, type: {type: string}, label: {type: string}, actor: {type: string} } }
    ChangeRequest:   # superset of ccp/app/src/types/request.ts:39-62
      type: object
      required: [id, requester, service, operationId, macd, targetAddress, params, justification, exposure, risk, status, createdAt, updatedAt, events]
      properties: { id: {type: string}, requester: {type: string}, teamId: {type: string}, service: {type: string},
        operationId: {type: string}, macd: {type: string, enum: [Move, Add, Change, Delete]}, targetAddress: {type: string},
        params: {type: object}, justification: {type: string, minLength: 10}, exposure: {type: string},
        reviewTier: {type: string, enum: [self_service, guardrails, engineer], description: "server-computed from exposure (ADR-0008); engineer → NEEDS_ENGINEER track; 0037 approval requirement is the [L2, L3] ladder — an approver may sign L2, a lead signs the final L3"},
        risk: {$ref: '#/components/schemas/Risk'},
        status: {type: string, description: "free-text; known values AWAITING_CODE_REVIEW | NEEDS_ENGINEER (open) → APPROVED_COOLING (interim quorum met AND schedule.kind='now' only, ADR-0009 cooling-off, 0021 G1 + 0024 §6.4-C4) → AWAITING_DEPLOY_APPROVAL (schedule.kind='window' — interim or not, cooling composed as an applyGate reason, never a second status; OR ANY schedule held by a freeze at quorum-met, event held_frozen) → WINDOW_EXPIRED (lazily once the window closes unapplied, or eagerly at quorum-met if already infeasible — 0024 §2.2/§2.3/E10; exits: POST .../rewindow, POST .../cancel) → APPLIED (lazily once earliestApplyAt elapses for schedule.kind='now', or instantly for a non-interim quorum) → CANCELLED (APPROVED_COOLING, AWAITING_DEPLOY_APPROVAL before/during its window, or WINDOW_EXPIRED — 0024 §2.5) | REJECTED"},
        approvalsRequired: {type: integer},
        approvals: {type: array, items: {$ref: '#/components/schemas/Approval'}},
        schedule: {type: object, description: "{kind:'now'} | {kind:'window', at, endAt} — Schedule v2 (0024 §2.1 V5): endAt is always stamped server-side (explicit or at+4h default) for a fresh submit/rewindow; absent only on legacy pre-v2 rows"},
        createdAt: {type: string}, updatedAt: {type: string}, prNumber: {type: integer}, prUrl: {type: string},
        planSummary: {type: string}, events: {type: array, items: {$ref: '#/components/schemas/RequestEvent'}},
        policyVersion: {type: integer}, interimProfile: {type: boolean}, earliestApplyAt: {type: string},
        eligibleApprovers: {type: integer, description: "submit-time snapshot (0021 G5); see /requests/{id}/feasibility for the live count"},
        feasible: {type: boolean, description: "0037: enough distinct eligible signers to fill every ladder step, incl. a lead for any L3 step"},
        interimProfileWillApply: {type: boolean, description: "retained for wire-compat; ALWAYS false since 0037 disabled the single-approver interim profile"},
        approvalLadder: {type: array, items: {type: string, enum: [L2, L3]}, description: "0037 two-level ladder: the ordered steps, each signed by a distinct person (L2 = approver-or-lead, L3 = lead)"},
        nextApprovalStep: {type: string, enum: [L2, L3], nullable: true, description: "0037: the next unsigned ladder step (null once fully signed) — server-computed, positional"},
        items: {type: array, description: "Phase B change set: the ordered operations this ONE reviewed change enacts, present only for a true set (length >= 2). Each carries {operationId, service, macd, targetAddress, params, exposure, reviewTier, replaceConfirmation?}. Absent for a single-op request — its top-level operationId/targetAddress/params ARE the one item. The request-level reviewTier/approvalsRequired hold the STRICTEST-combined requirement across all items",
          items: {type: object, properties: {operationId: {type: string}, service: {type: string}, macd: {type: string, enum: [Move, Add, Change, Delete]}, targetAddress: {type: string}, params: {type: object}, exposure: {type: string}, reviewTier: {type: string, enum: [self_service, guardrails, engineer]}, replaceConfirmation: {type: string}}}} }
    SubmitDraft:   # identity-free: requester/teamId/risk/approvalsRequired are IGNORED if sent; server recomputes all
      # TWO shapes, ONE handler (Phase B — the multi-operation change set). SINGLE-OP: top-level
      # operationId/targetAddress/params (unchanged). CHANGE SET: `items` — several operations reviewed and
      # applied as ONE change (multi-edit on one resource, or one action fanned across many targets), sharing ONE
      # justification + schedule + approval. The server validates EVERY item with the same per-op gates and
      # rejects the WHOLE set if any item fails (ATOMIC); the review requirement is the STRICTEST across all items
      # (tighten-only); a completed set lands exactly where a single-op change does (nothing auto-applies).
      type: object
      required: [justification, schedule]   # operationId/targetAddress/params (single-op) OR items (a set)
      properties: { operationId: {type: string}, targetAddress: {type: string}, params: {type: object},
        replaceConfirmation: {type: string, description: "single-op forces-replace confirmed-override — must equal targetAddress; per-item for a set (SubmitItem.replaceConfirmation)"},
        items: {type: array, minItems: 1, maxItems: 100, items: {$ref: '#/components/schemas/SubmitItem'},
          description: "the change set: an ordered list of operations enacted as ONE reviewed change. length 1 is normalized to single-op. Every item is validated atomically (unknown op → VALIDATION_FAILED; disabled → OP_DISABLED; out-of-team → TEAM_SCOPE; bounds → PARAM_OUT_OF_BOUNDS; forces-replace without a matching confirmation → REPLACE_CONFIRMATION_REQUIRED) and the whole set is rejected on the FIRST failure — nothing is stored"},
        justification: {type: string, minLength: 10},
        schedule: {type: object, description: "{kind:'now'} | {kind:'window', at, endAt?} — validated server-side (0024 §2.1 V1-V6): at must be RFC3339, >= now+30min, <= now+90d; endAt, if sent, must be > at and span <= 24h (else defaults to at+4h). Rejected with SCHEDULE_INVALID/SCHEDULE_TOO_SOON/SCHEDULE_TOO_FAR (422)"},
        idempotencyKey: {type: string, description: dedupe key; replays return the original request } }
    SubmitItem:   # one operation inside a change set — client supplies ONLY intent; service/macd/exposure/tier server-computed per item
      type: object
      required: [operationId, targetAddress, params]
      properties: { operationId: {type: string}, targetAddress: {type: string}, params: {type: object},
        replaceConfirmation: {type: string, description: "this item's forces-replace confirmed-override — must equal THIS item's targetAddress (no replay onto another target)"} }
    PendingConfigChange: { type: object, required: [id, kind, before, after, proposedBy, proposedAt, status, expiresAt],
      properties: { id: {type: string}, kind: {type: string, enum: [policy-downgrade, risk-reduction, role-grant-senior,
          role-revoke-senior, admin-grant, admin-revoke, password-reset-senior, catalog-enable, allowlist-widen,
          project-trust, project-deregister]},
        before: {}, after: {}, proposedBy: {type: string}, proposedAt: {type: string},
        status: {type: string, enum: [PENDING, APPLIED, REJECTED, EXPIRED, SUPERSEDED]},
        expiresAt: {type: string}, ackBy: {type: string}, ackAt: {type: string} } }
    AuditEntry: { type: object, required: [id, at, actor, action, targetType, targetId, prevHash, hash],
      properties: { id: {type: string}, at: {type: string}, actor: {type: string}, action: {type: string},
        targetType: {type: string}, targetId: {type: string}, before: {}, after: {}, requestId: {type: string},
        interimProfile: {type: boolean}, prevHash: {type: string}, hash: {type: string} } }
    Feasibility:   # 0021 G5 — LIVE-recomputed (GET /requests/{id}/feasibility), not the ChangeRequest snapshot
      type: object
      required: [requestId, status, approvals, approvalsRequired, eligibleApprovers, feasible, interimProfileWillApply]
      properties: { requestId: {type: string}, status: {type: string}, approvals: {type: integer},
        approvalsRequired: {type: integer, description: "the CURRENT tighten-only requirement, same math as approve()"},
        eligibleApprovers: {type: integer}, feasible: {type: boolean}, interimProfileWillApply: {type: boolean} }
    Me: { type: object, required: [user], properties: { user: {$ref: '#/components/schemas/Account'},
      mustChangePassword: {type: boolean}, sessionExpiresAt: {type: string} } }
    PrescanFinding: { type: object, required: [code, file, line],
      properties: { code: {type: string, description: 'DATA_EXTERNAL | PROVISIONER | PROVIDER_SOURCE | MODULE_SOURCE | NONSTATIC_SOURCE'},
        file: {type: string}, line: {type: integer} } }
    PrescanReport:   # the prescan-report.json catalogctl onboard writes — key set golden-pinned Go-side
      type: object
      required: [repo, verdict, findings, resourceBlocks, moduleBlocks, tfJsonFiles, fmtDirtyFiles, providerPins]
      properties: { repo: {type: string}, verdict: {type: string, enum: [clean, reject]},
        findings: {type: array, items: {$ref: '#/components/schemas/PrescanFinding'}},
        resourceBlocks: {type: integer}, moduleBlocks: {type: integer}, tfJsonFiles: {type: integer},
        fmtDirtyFiles: {type: integer}, providerPins: {type: object, additionalProperties: {type: string}} }
    RepoRef:   # host-agnostic repo reference — the migration target for the GitHub-only `github` field
      type: object
      required: [host, owner, name]
      properties: { host: {type: string, enum: [github, gitlab]},
        baseUrl: {type: string, description: 'self-hosted forge origin (https only); absent = the public host'},
        owner: {type: string, description: 'may carry /-separated group segments (GitLab subgroups)'},
        name: {type: string} }
    ProjectDataDigests:   # sha256 over the CANONICAL JSON (recursive key-sorted, no whitespace) of each part
      type: object
      required: [inventorySha256, blocksSha256]
      properties: { inventorySha256: {type: string, pattern: '^[a-f0-9]{64}$'},
        blocksSha256: {type: string, pattern: '^[a-f0-9]{64}$'},
        manifestsSha256: {type: string, pattern: '^[a-f0-9]{64}$', description: 'present iff the bundle carried manifests'} }
    ProjectDataVersion:   # one uploaded (staged/active) served-data version's metadata; content lives on the api host's disk
      type: object
      required: [version, status, uploadedAt, uploadedVia, digests, uploadDigests, counts, chunks, warnings]
      properties: { version: {type: integer, minimum: 1}, status: {type: string, enum: [staged, active]},
        uploadedAt: {type: string}, uploadedVia: {type: string, description: 'upload-token:<tokenId> — this lane is CI, never a user'},
        digests: {$ref: '#/components/schemas/ProjectDataDigests'},
        uploadDigests: {$ref: '#/components/schemas/ProjectDataDigests'},
        counts: { type: object, required: [resources, blockAddresses, blockChunks, manifests],
          properties: { resources: {type: integer}, blockAddresses: {type: integer}, blockChunks: {type: integer}, manifests: {type: integer} } },
        chunks: {type: array, items: {type: string}},
        warnings: {type: array, items: {type: string}},
        sourceCommit: {type: string}, generatedAt: {type: [string, 'null']},
        providerPins: {type: object, additionalProperties: {type: string}} }
    DriftCounts:   # per class + drifted total + security total — recomputed server-side, never trusted from the classifier's own claim
      type: object
      required: [drifted, security, byClass]
      properties: { drifted: {type: integer}, security: {type: integer}, byClass: {type: object, additionalProperties: {type: integer}},
        unmanaged: {type: integer, description: 'OOB provisioning spec §3.2 rule 4 — sweep.totalFindings, 0 when the envelope carries no sweep section'} }
    DriftFindingActor:   # §2.5 CloudTrail actor-enrichment sub-row — display evidence, prose, never keyed on
      type: object
      properties: { eventName: {type: string}, eventTime: {type: string}, who: {type: string}, sourceIp: {type: string} }
    DriftImportPayload:   # §2.6 generated import payload — the EXACT bytes that would land on main
      type: object
      required: [address, targetFile, importBlock, skeletonHcl]
      properties: { address: {type: string}, targetFile: {type: string}, importBlock: {type: string}, skeletonHcl: {type: string} }
    DriftImportProposalPayload:   # §5.1/§5.4 the import FLAVOR's own proposal-level payload (catalogctl ImportProposalPayload) —
      # distinct from DriftImportPayload above: carries the reviewed live-resource IDENTITY (arn/tfType/liveId, feeding the
      # §5.4 digest formula) alongside the same importBlock/skeletonHcl bytes; address is not repeated (already addresses[0])
      type: object
      required: [arn, tfType, liveId, targetFile, importBlock, skeletonHcl]
      properties: { arn: {type: [string, 'null']}, tfType: {type: string}, liveId: {type: string},
        targetFile: {type: string}, importBlock: {type: string}, skeletonHcl: {type: string} }
    DriftFinding:   # one unmanaged-resource finding (OOB provisioning spec §2.4). Identity is `arn` when derivable, else tfType+liveId.
      # `class` is a free STRING, same tolerant doctrine as DriftVerdict; role-projected (requester tier: taxonomy + payload PRESENCE only)
      type: object
      required: [class, tfType, liveId]
      properties: { class: {type: string}, arn: {type: [string, 'null'], description: 'when derivable; else null'},
        tfType: {type: string}, liveId: {type: string, description: 'the Terraform import id'},
        name: {type: string}, service: {type: string}, stateful: {type: boolean}, region: {type: string},
        securityFamily: {type: boolean, description: 'advisory copy of the publisher''s creation-security screen — re-derived everywhere it matters'},
        actor: {oneOf: [{$ref: '#/components/schemas/DriftFindingActor'}, {type: 'null'}], description: 'approver+ only'},
        importPayload: {oneOf: [{$ref: '#/components/schemas/DriftImportPayload'}, {type: 'null'}],
          description: 'approver+ only; requester tier sees importPayloadPresent (boolean) instead. May be stripped server-side (drop, never mask) when the generated HCL carries secret-shaped values — payloadWithheldReason then explains why'},
        payloadWithheldReason: {type: [string, 'null'], description: 'approver+ only'} }
    DriftSweep:   # the envelope's additive top-level `sweep` section (§3.1) — absent ⇒ a producer that has not upgraded
      type: object
      properties: { method: {type: string}, capturedAt: {type: string}, region: {type: string},
        findings: {type: array, items: {$ref: '#/components/schemas/DriftFinding'}, description: 'sorted by arn/id, detail-capped at 200; requester tier projects each row to {class, tfType, name, service, securityFamily, importPayloadPresent}'},
        totalFindings: {type: integer, description: 'TRUE count even when findings[] detail is capped'},
        ignoredCount: {type: integer},
        coverage: {description: 'the kit manifest''s coverage block, carried verbatim/opaque'} }
    DriftChangedAttr:   # one changed-attribute row; liveJson/codeJson present only when sensitive is false (drift-portal spec §2.2)
      type: object
      required: [path]
      properties: { path: {type: string}, live: {type: string}, code: {type: string}, sensitive: {type: boolean},
        liveJson: {description: 'exact plan value — present only when sensitive is false'},
        codeJson: {description: 'exact plan value — present only when sensitive is false'} }
    DriftVerdict:   # one resource verdict. `class` is a free STRING, never a wire enum (drift-portal spec §2.1) — the
      # eleven-id taxonomy (D1-D11) is a consumer-side fail-closed contract; role-projected (requester tier omits values)
      type: object
      required: [address, class]
      properties: { address: {type: string}, type: {type: string}, class: {type: string}, riskTier: {type: string},
        actions: {type: array, items: {type: string}}, driftEvidence: {type: boolean},
        changedAttrs: {type: array, items: {$ref: '#/components/schemas/DriftChangedAttr'},
          description: 'requester tier: reduced to {path} only per row (spec §4.2 field-tier table)'},
        forceNewAttrs: {type: array, items: {type: object}},
        securityHits: {type: array, items: {type: object, properties: {path: {type: string}, why: {type: string}}},
          description: 'approver+ only'},
        recommendation: {type: string, description: 'approver+ only'}, neverDo: {type: string, description: 'approver+ only'},
        executor: {type: string} }
    DriftStatus:   # GET /projects/{id}/drift response (drift-portal spec §4.2, proposals[] added WI-6)
      type: object
      required: [connected]
      properties: { connected: {type: boolean, description: 'false ⇔ CCP_DRIFT disarmed OR no report ever staged for this project'},
        report: { type: [object, 'null'], description: 'absent when connected:false; null when the stored envelope fails schema validation on read (fail closed, never partially rendered)',
          properties: { version: {type: integer}, capturedAt: {type: string}, runId: {type: string}, commit: {type: string},
            cadenceHours: {type: number}, planExitCode: {type: integer, enum: [0, 2]},
            counts: {$ref: '#/components/schemas/DriftCounts'},
            verdicts: {type: array, items: {$ref: '#/components/schemas/DriftVerdict'}},
            absorbed: {type: array, items: {type: object, properties: {address: {type: string}, class: {type: string}, riskTier: {type: string}}}},
            invisibleToPlan: {type: string, description: 'the classifier''s standing completeness footer — always rendered, every role'},
            sweep: {oneOf: [{$ref: '#/components/schemas/DriftSweep'}, {type: 'null'}],
              description: 'OOB provisioning spec §3.3 — null when the envelope carries no sweep section (a producer that has not upgraded; distinct from "swept, zero findings"). Summary fields are the same for every role; findings[] rows are role-projected'} } },
        proposals: {type: array, items: {$ref: '#/components/schemas/DriftProposal'}, description: 'approver+ only (spec §4.2 field-tier table); absent for a requester-tier view. Excludes superseded rows — the live surface, not the archive'} }
    DriftProposal:   # one generated fix, approver+ view (drift-portal spec §3.2/§6.1, WI-6; flavor 'import' + importPayload additive, OOB spec §5.1/WI-S6; flavor 'restore' additive, L29 register 0009, 2026-07-20-drift-restore-tranche.md §2.2/§2.5)
      type: object
      required: [digest, flavor, status, addresses, attrCount, generatedAt, lastSeenReportVersion, diff, attrs]
      properties: { digest: {type: string, pattern: '^[0-9a-f]{64}$'}, flavor: {type: string, enum: [adopt, revert, import, restore]},
        status: {type: string, enum: [open, submitted, superseded]},
        addresses: {type: array, items: {type: string}}, attrCount: {type: integer},
        generatedAt: {type: string}, lastSeenReportVersion: {type: integer},
        requestId: {type: string, description: 'present once status is submitted'},
        diff: {type: [string, 'null'], description: 'unified edit diff (adopt); null for revert/import/restore (§6.4/§5.1/L29 §2.2 — no edit)'},
        attrs: {type: array, items: {type: object, properties: {address: {type: string}, path: {type: string}, liveJson: {}, codeJson: {}}}, description: 'import/restore: always [] — a payload or a bare re-assert, not attribute edits'},
        importPayload: {$ref: '#/components/schemas/DriftImportProposalPayload', description: 'import only, additive — absent for adopt/revert'} }
    ProjectSummary:   # 0033 §3.2 line 409 — the documented "any session" registry shape (security review: no report/findings/uploadedBy/createdBy/artifacts)
      type: object
      required: [id, name, repo, status]  # identity is provider-discriminated (0039 S1): aws → accountId+region · azure → provider+subscriptionId+tenantId+location
      properties: { id: {type: string, pattern: '^[a-z][a-z0-9-]{1,31}$'}, name: {type: string},
        github: {type: object, required: [owner, repo], description: 'legacy mirror — present only when repo.host is github',
          properties: { owner: {type: string}, repo: {type: string} }},
        repo: {$ref: '#/components/schemas/RepoRef'},
        provider: {type: string, enum: [aws, azure], description: 'absent = aws (an aws row omits it)'},
        accountId: {type: string, pattern: '^\d{12}$'}, region: {type: string},
        subscriptionId: {type: string}, tenantId: {type: string}, location: {type: string},
        status: {type: string, enum: [draft, pending-trust, trusted, ready]},
        trust: { type: object, required: [trustedBy, trustedAt, preScanReportSha256, commitSha],
          properties: { trustedBy: {type: string}, trustedAt: {type: string},
            preScanReportSha256: {type: string}, commitSha: {type: string} } },
        archived: { type: object, required: [archivedBy, archivedAt],
          properties: { archivedBy: {type: string}, archivedAt: {type: string} } } }
    Project:   # 0033 §3.2 — RICH projection (lead+isAdmin only); rawReport (the uploaded bytes) NEVER serializes
      type: object
      required: [id, name, repo, status, createdBy, createdAt]  # identity is provider-discriminated (0039 S1): aws → accountId+region · azure → provider+subscriptionId+tenantId+location
      properties: { id: {type: string, pattern: '^[a-z][a-z0-9-]{1,31}$'}, name: {type: string},
        github: {type: object, required: [owner, repo], description: 'legacy mirror — present only when repo.host is github',
          properties: { owner: {type: string}, repo: {type: string} }},
        repo: {$ref: '#/components/schemas/RepoRef'},
        provider: {type: string, enum: [aws, azure], description: 'which cloud (0039 S1); absent = aws (an aws row omits it entirely)'},
        accountId: {type: string, pattern: '^\d{12}$'}, region: {type: string, description: 'AWS commercial region (explicit allowlist, routes/projects.ts REGION_ALLOWLIST)'},
        subscriptionId: {type: string, description: 'Azure subscription id (GUID) — present iff provider is azure'},
        tenantId: {type: string, description: 'Azure tenant/directory id (GUID) — present iff provider is azure'},
        location: {type: string, description: 'Azure location (explicit allowlist, routes/projects.ts AZURE_LOCATION_ALLOWLIST) — present iff provider is azure'},
        status: {type: string, enum: [draft, pending-trust, trusted, ready],
          description: "strict forward ladder: draft → pending-trust (artifact upload) → trusted (dual-controlled trust-ack) → ready (the first data activation's 2-admin ack — the ONLY transition to ready). Only 'ready' projects are routable via x-ccp-project or valid as account bindings (fail closed)"},
        createdBy: {type: string}, createdAt: {type: string},
        trustRequest: { type: object, required: [repo, commitSha, prescanSha256, uploadedBy, uploadedAt, report],
          properties: { repo: {type: string}, commitSha: {type: string}, prescanSha256: {type: string},
            uploadedBy: {type: string}, uploadedAt: {type: string}, report: {$ref: '#/components/schemas/PrescanReport'} } },
        trust: { type: object, required: [trustedBy, trustedAt, preScanReportSha256, commitSha],
          description: 'R3 §6.4 trust block — written ONLY by the dual-controlled trust flow, never accepted from a body',
          properties: { trustedBy: {type: string}, trustedAt: {type: string},
            preScanReportSha256: {type: string}, commitSha: {type: string} } },
        artifacts: { type: object, required: [inventorySha256, blocksSha256, recordedBy, recordedAt],
          description: 'the go-live digest record — written ONLY by the FIRST data activation''s ack (server-computed
            digests of the activated version). manifestsSha256 present iff the recorded version carried manifests',
          properties: { inventorySha256: {type: string}, blocksSha256: {type: string}, manifestsSha256: {type: string},
            recordedBy: {type: string}, recordedAt: {type: string} } },
        dataActive: { type: object, required: [version, activatedBy, activatedAt],
          description: 'the ACTIVE served-data version pointer — written ONLY by the dual-controlled activate flow',
          properties: { version: {type: integer}, activatedBy: {type: string}, activatedAt: {type: string} } },
        archived: { type: object, required: [archivedBy, archivedAt],
          properties: { archivedBy: {type: string}, archivedAt: {type: string} } } }
paths:
  /instance:
    get:
      security: []   # ADR-0023 — unauthenticated: the login page renders the instance name pre-auth
      summary: 'Instance display identity (name + tagline only — no version/updatedBy leak). Absent
        INSTANCE row -> {name: null, tagline: null}; the SPA stays on its baked-generic default.'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object,
          required: [name, tagline],
          properties: { name: {type: [string, 'null']}, tagline: {type: [string, 'null']} } } } } }
  /admin/instance:
    put:
      summary: 'Rename the instance (ADR-0023). Admin capability, GLOBAL — deliberately NOT gated by
        requireProjectMembership (instance naming is not a project verb). Validated (name: trimmed,
        single-line, 1-64 chars, no control characters; tagline: same rules, 0-140), version-guarded
        (read-then-guarded-write; a lost race -> 409 INSTANCE_STALE), audited as instance-identity-change
        on the control-plane chain. Classification: immediate + audited, never dual-control (a display
        string, not a privilege edge).'
      parameters: [{ $ref: '#/components/parameters/client' }]
      requestBody: { required: true, content: { application/json: { schema: { type: object,
        required: [name], properties: { name: {type: string, minLength: 1, maxLength: 64},
          tagline: {type: string, maxLength: 140} } } } } }
      responses:
        '200': { description: Applied, content: { application/json: { schema: { type: object,
          required: [name, tagline, version],
          properties: { name: {type: string}, tagline: {type: string}, version: {type: integer} } } } } }
        '401': { $ref: '#/components/responses/E401' }
        '403': { $ref: '#/components/responses/E403' }
        '409': { description: INSTANCE_STALE — changed since you read it, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } }
        '422': { $ref: '#/components/responses/E422' }
  /auth/login:
    post:
      security: []   # unauthenticated, like /instance above — the only OTHER route besides /auth/totp*
      summary: Verify credentials; set session cookie. Generic failure message (auth.ts:91 parity).
      requestBody: { required: true, content: { application/json: { schema: { type: object,
        required: [username, password], properties: { username: {type: string}, password: {type: string} } } } } }
      responses:
        '200': { description: Session set (or totpRequired=true with a short-lived pre-session), content: { application/json: {
          schema: { allOf: [{ $ref: '#/components/schemas/Me' }, { type: object, properties: { totpRequired: {type: boolean} } }] } } } }
        '401': { $ref: '#/components/responses/E401' }
        '423': { $ref: '#/components/responses/E423' }
        '429': { $ref: '#/components/responses/E429' }
  /auth/totp:
    post: { security: [], summary: Complete TOTP step for approver/lead (pre-session cookie + 6-digit code),
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code],
        properties: { code: {type: string} } } } } },
      responses: { '200': { description: Full session set, content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } } },
        '401': { $ref: '#/components/responses/E401' }, '429': { $ref: '#/components/responses/E429' } } }
  /auth/totp/enroll:
    post: { security: [], summary: 'Confirm FIRST-LOGIN TOTP enrollment (pre-session cookie with pending=enroll +
        6-digit code against the not-yet-persisted secret). Success persists the factor on the account and swaps
        the pre-session for a full session (auth.ts:172-191 parity)',
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code],
        properties: { code: {type: string} } } } } },
      responses: { '200': { description: Enrolled; full session set, content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } } },
        '401': { $ref: '#/components/responses/E401' }, '429': { $ref: '#/components/responses/E429' } } }
  /auth/logout:
    post: { summary: Delete the server session; clear cookie, responses: { '204': { description: Signed out } } }
  /auth/me:
    get: { summary: Session probe (slides the 30m idle window, session.ts parity),
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } } },
        '401': { $ref: '#/components/responses/E401' } } }
  /auth/change-password:
    post: { summary: 'Actor changes OWN password (clears mustChangePassword, re-issues session; account & security spec §4). keepOtherSessions (default false): false bumps sessionVersion, invalidating every other session (today''s behavior); true keeps other sessions alive (credential swap only) — audited password-change gains after:{otherSessionsKept:true}',
      requestBody: { required: true, content: { application/json: { schema: { type: object,
        required: [currentPassword, newPassword], properties: { currentPassword: {type: string},
        newPassword: {type: string, minLength: 8}, keepOtherSessions: {type: boolean} } } } } },
      responses: { '200': { description: Changed }, '401': { $ref: '#/components/responses/E401' },
        '422': { $ref: '#/components/responses/E422' } } }
  /auth/reauth:
    post: { summary: 'ADR-0026 — re-authentication gate. EXACTLY ONE of {password} or {code} (a live TOTP code from any enrolled device; recovery codes never accepted). Success stamps reauthAt (ISO) on the CURRENT session item, valid REAUTH_MS=10 minutes; failures bump the same login lockout counter and a locked account is refused LOGIN_BACKOFF before the body is even checked',
      requestBody: { required: true, content: { application/json: { schema: { oneOf: [
        { type: object, required: [password], properties: { password: {type: string} }, additionalProperties: false },
        { type: object, required: [code], properties: { code: {type: string} }, additionalProperties: false } ] } } } },
      responses: { '200': { description: Elevated, content: { application/json: { schema: { type: object,
        required: [ok, reauthAt], properties: { ok: {type: boolean}, reauthAt: {type: string} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '422': { $ref: '#/components/responses/E422' },
        '429': { $ref: '#/components/responses/E429' } } }
  /auth/totp/recovery:
    post: { security: [], summary: 'ADR-0025 — recovery-code login: another way to satisfy the SAME pending:''totp'' pre-session (not a new door). Burns exactly one code, mints a full session, response carries recoveryLogin:true. Failure is generic TOTP_REQUIRED (no enumeration) and feeds the same lockout backoff as a bad password',
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code],
        properties: { code: {type: string} } } } } },
      responses: { '200': { description: Full session set, content: { application/json: { schema: { allOf: [
        { $ref: '#/components/schemas/Me' }, { type: object, properties: { recoveryLogin: {type: boolean} } } ] } } } },
        '401': { $ref: '#/components/responses/E401' }, '429': { $ref: '#/components/responses/E429' } } }
  /auth/totp-devices:
    get: { summary: 'List the caller''s enrolled TOTP devices (ADR-0024 §5) — id/name/enrolledAt/lastUsedAt only, NEVER secretEnc',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object,
        required: [id, name, enrolledAt], properties: { id: {type: string}, name: {type: string}, enrolledAt: {type: string}, lastUsedAt: {type: string} } } } } } },
        '401': { $ref: '#/components/responses/E401' } } }
    post: { summary: 'Begin adding a device (⚿ re-auth required): mints a secret held on the CALLER''S FULL session (enrollSecretEnc/enrollOfferedAt), returns the QR/setup-key material. Offer expires after TOTP_PENDING_MS (5 minutes). Refused at the 5-device cap',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object,
        required: [secret, otpauthUri], properties: { secret: {type: string}, otpauthUri: {type: string} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } },
        '422': { description: DEVICE_LIMIT, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } } } }
  /auth/totp-devices/confirm:
    post: { summary: 'Confirm the held secret with a live code + a name (⚿ re-auth required; trimmed, single-line, 1-40 chars, no control chars). Appends the named device (materializes totpDevices, deletes the legacy totp field — ADR-0024 clause 2, idempotent). The account''s FIRST device auto-issues recovery codes (ADR-0025 clause 2), returned once in this response',
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code, name],
        properties: { code: {type: string}, name: {type: string, minLength: 1, maxLength: 40} } } } } },
      responses: { '200': { description: Added, content: { application/json: { schema: { type: object,
        required: [id, name, enrolledAt], properties: { id: {type: string}, name: {type: string}, enrolledAt: {type: string},
        recoveryCodes: {type: array, items: {type: string}, description: 'present ONLY on the account''s first device'} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } },
        '422': { $ref: '#/components/responses/E422' } } }
  /auth/totp-devices/{id}:
    delete: { summary: 'Remove a device by id (⚿ re-auth required). Refuses LAST_FACTOR if it is the last device AND needsTotp(account) is true. If the last device and removal IS allowed, the recovery-code set is deleted with it (audited both totp-device-remove and recovery-codes-clear)',
      parameters: [{ $ref: '#/components/parameters/id' }],
      responses: { '200': { description: Removed }, '401': { $ref: '#/components/responses/E401' },
        '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } },
        '404': { description: No such device }, '422': { description: LAST_FACTOR, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } } } }
  /auth/recovery-codes:
    get: { summary: 'Counts ONLY, ever — {remaining, generatedAt?}. Never the codes or their hashes, in any response',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, required: [remaining],
        properties: { remaining: {type: integer}, generatedAt: {type: string} } } } } },
        '401': { $ref: '#/components/responses/E401' } } }
  /auth/recovery-codes/regenerate:
    post: { summary: 'Replace the WHOLE recovery-code set (⚿ re-auth required) — old codes all die. Refused TOTP_REQUIRED when no device is enrolled (codes exist only while 2FA is active). Returns the 10 fresh plaintext codes EXACTLY ONCE',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, required: [codes, generatedAt],
        properties: { codes: {type: array, items: {type: string}, minItems: 10, maxItems: 10}, generatedAt: {type: string} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } } } }
  /auth/sessions:
    get: { summary: 'The caller''s own LIVE sessions (expired/pre-session rows filtered out). id is the stored sha256 of the token (never the token itself); current marks the session resolved for THIS request',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object,
        required: [id, issuedAt, lastSeenAt, current], properties: { id: {type: string}, issuedAt: {type: string}, lastSeenAt: {type: string}, current: {type: boolean} } } } } } },
        '401': { $ref: '#/components/responses/E401' } } }
  /auth/sessions/{id}:
    delete: { summary: 'Revoke ONE of the caller''s OWN sessions (⚿ re-auth required) — 404 on any id not in their own list (no cross-user probing). Deleting the CURRENT session IS sign-out',
      parameters: [{ $ref: '#/components/parameters/id' }],
      responses: { '200': { description: Revoked }, '401': { $ref: '#/components/responses/E401' },
        '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } },
        '404': { description: No such session } } }
  /auth/sessions/revoke-others:
    post: { summary: 'Sign out every OTHER session (⚿ re-auth required), keeping the caller''s own alive — deliberately NO sessionVersion bump (that would kill the keeper too)',
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object,
        required: [ok, revoked], properties: { ok: {type: boolean}, revoked: {type: integer} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { description: REAUTH_REQUIRED, content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } } } } }
  /requests:
    get: { summary: List requests. scope=mine|pending|all; pending/all require approver|lead (server-filtered by canApprove),
      parameters: [{ name: scope, in: query, required: true, schema: { type: string, enum: [mine, pending, all] } },
        { $ref: '#/components/parameters/cursor' }],
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object,
        properties: { items: {type: array, items: {$ref: '#/components/schemas/ChangeRequest'}}, cursor: {type: string} } } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' } } }
    post: { summary: Submit. Server derives requester+teamId from session, enforces canRequest, re-validates params against
        the manifest, rejects disabled ops and global freeze, computes approvalsRequired via approvalsFor(effectiveRisk, macd, serverPolicy) and stamps policyVersion.
        Also computes + persists quorum feasibility (0021 G5) — never a submit gate (ADR-0008/0009), purely informational,
      parameters: [{ $ref: '#/components/parameters/client' }],
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SubmitDraft' } } } },
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '422': { $ref: '#/components/responses/E422' }, '423': { $ref: '#/components/responses/E423' },
        '429': { $ref: '#/components/responses/E429' } } }
  /requests/{id}:
    get: { parameters: [{ $ref: '#/components/parameters/id' }], summary: Get one request,
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '404': { description: Not found } } }
  /requests/{id}/approve:
    post: { summary: 'Approve one ladder step. Actor from session ONLY (requires an enrolled TOTP factor — 0021 G3
        belt-and-braces). Middleware chain (§5) enforces role, SoD, dedupe, state. 0037 two-level ladder: the
        requirement is an ordered list of steps (self_service [L2]; guardrails/engineer/forces-replace [L2, L3])
        recomputed tighten-only (strictest of the stamped and current tier). Each signature fills the NEXT
        POSITIONAL step; the signer role must satisfy it (L2 = approver-or-lead, L3 = lead) else 403
        WRONG_APPROVAL_LEVEL, and a person who already signed any step is refused 409 ALREADY_APPROVED — so L3 is
        never signed before L2 and never by the same person. Completion = every step signed by a distinct person;
        there is NO single-approver interim/cooling exception (0037 disabled it — a NEW request never enters
        APPROVED_COOLING). At completion a freeze holds ANY schedule at AWAITING_DEPLOY_APPROVAL (event
        held_frozen); a window already past lands WINDOW_EXPIRED (event window_infeasible, 0024 §2.2/E10); else
        APPLIED (schedule.kind="now") or AWAITING_DEPLOY_APPROVAL (schedule.kind="window"). Legacy
        APPROVED_COOLING rows still settle via domain/cooling.ts. See /requests/{id}/cancel, /requests/{id}/rewindow',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      responses: { '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '409': { $ref: '#/components/responses/E409' }, '422': { $ref: '#/components/responses/E422' } } }
  /requests/{id}/reject:
    post: { summary: Reject (approver|lead, not own request; reason optional — api.ts:293-318 parity),
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      requestBody: { content: { application/json: { schema: { type: object, properties: { reason: {type: string} } } } } },
      responses: { '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '409': { $ref: '#/components/responses/E409' } } }
  /requests/{id}/cancel:
    post: { summary: 'Cancel an approved-but-unapplied change (0021 G1 + 0024 §2.5, widened): valid while
        APPROVED_COOLING (the ADR-0009 cooling-off), AWAITING_DEPLOY_APPROVAL (before OR during its maintenance
        window), or WINDOW_EXPIRED; any other state (incl. already-APPLIED, or still open pre-quorum) is 409. Actor
        from session ONLY: the requester or a Lead/admin (a plain approver who is neither is 403
        CANCEL_FORBIDDEN). Idempotent-safe: a second cancel (or a cooling window/maintenance window that already
        elapsed) cleanly conflicts, never double-applies. Settles cooling then window-expiry first, same as GET
        /requests/{id}',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      responses: { '200': { description: 'Cancelled', content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' } } }
  /requests/{id}/rewindow:
    post: { summary: 'Re-time a maintenance window (0024 §2.4) — the exit from WINDOW_EXPIRED, or a before-window
        re-time of an AWAITING_DEPLOY_APPROVAL request (refused once the window is CURRENTLY open — cancel is the
        verb for a during-window stop instead; also refused for a schedule.kind:"now" row, which has no window to
        move). Body {at, endAt?} is revalidated exactly like submit (V2-V6, SCHEDULE_INVALID/SCHEDULE_TOO_SOON/
        SCHEDULE_TOO_FAR), plus an eager re-check that the new window can still satisfy any existing cooling-off
        (else SCHEDULE_INVALID, E10). Refuses SCHEDULE_STALE_APPROVAL when the last approval is more than 30 days
        old. Actor from session ONLY: the requester or a Lead/admin (a plain approver who is neither is 403
        REWINDOW_FORBIDDEN). Approvals SURVIVE untouched — the quorum is bound to the plan digest, never the
        wall-clock',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [at],
        properties: { at: {type: string, format: date-time}, endAt: {type: string, format: date-time} } } } } },
      responses: { '200': { description: 'Re-windowed', content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' }, '422': { $ref: '#/components/responses/E422' } } }
  /requests/{id}/link-pr:
    post: { summary: 'Record the fulfilling engineering PR on a request (closes the NEEDS_ENGINEER loop — the
        requester sees "Track the engineering PR" instead of a dead phase; also serves the Stage-2 PR pipeline
        rows). Lead-only — the engineer track''s approval authority. Sets prNumber/prUrl (the additive
        ChangeRequest fields), appends a pr_linked event, audit action request-link-pr with before/after.
        prUrl must be a parseable https URL; prNumber derives from a /pull/{n}-shaped tail when omitted.
        Re-linking is allowed (correcting a wrong URL) and audited. Refused for REJECTED/CANCELLED (409) —
        a terminally-refused request has no fulfilling PR. Status never changes here',
      parameters: [{ $ref: '#/components/parameters/id' }, { $ref: '#/components/parameters/client' }],
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [prUrl],
        properties: { prUrl: {type: string, maxLength: 500, description: 'https:// URL of the pull request'},
          prNumber: {type: integer, minimum: 1} } } } } },
      responses: { '200': { description: Linked, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequest' } } } },
        '401': { $ref: '#/components/responses/E401' }, '403': { $ref: '#/components/responses/E403' },
        '404': { description: Not found }, '409': { $ref: '#/components/responses/E409' },
        '422': { $ref: '#/components/responses/E422' } } }
  /requests/{id}/feasibility:
    get: { summary: 'Quorum feasibility, computed LIVE (0021 G5) — required approvals vs. eligible approvers
        (G2-filtered: project-bound, activated, tier-role, active, excluding the requester). Never gates
        submission (ADR-0008/0009); this is informational. Settles an elapsed APPROVED_COOLING window first
        (0021 G1), same as GET /requests/{id}',
      parameters: [{ $ref: '#/components/parameters/id' }],
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Feasibility' } } } },
        '401': { $ref: '#/components/responses/E401' }, '404': { description: Not found } } }
  /catalog/manifests:
    get: { summary: Bundled manifest set + catalogVersion (disabled ops filtered out), responses: { '200': { description: OK } } }
  /catalog/inventory:
    get: { summary: Inventory snapshot, responses: { '200': { description: OK } } }
  /admin/accounts:
    get: { summary: List accounts (isAdmin), responses: { '200': { description: OK, content: { application/json: {
        schema: { type: array, items: { $ref: '#/components/schemas/Account' } } } } }, '403': { $ref: '#/components/responses/E403' } } }
    post: { summary: Enroll (isAdmin; accounts.ts:170-199 validation; enrolling approver|lead or isAdmin=true → 202 dual-control),
      parameters: [{ $ref: '#/components/parameters/client' }],
      requestBody: { required: true, content: { application/json: { schema: { type: object,
        required: [username, displayName, role, teamId, password], properties: { username: {type: string, pattern: '^[a-z0-9._-]{2,32}$'},
          displayName: {type: string}, role: {$ref: '#/components/schemas/Role'}, teamId: {type: string},
          password: {type: string, minLength: 8} } } } } },
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Account' } } } },
        '202': { description: PendingConfigChange created (§6) }, '403': { $ref: '#/components/responses/E403' },
        '409': { $ref: '#/components/responses/E409' }, '422': { $ref: '#/components/responses/E422' } } }
  /admin/accounts/{id}:
    patch: { summary: 'Per-project authorization VERBS (at most one of setRole/setTeam/revoke, each naming ONE
        registered projectId — never a whole-map write) plus the global fields status/isAdmin/totpRequired, or a
