name: publish-gate

# The publish-safety gate (scripts/publish-gate.sh) on every change: generic-patterns
# mode — the denylist file is deliberately absent in the public repo, so the gate runs
# its always-on generic backstop checks (account-id shapes, key-id shapes, secret-shaped
# assignments, private-path escapees, gitleaks, binary blobs). A private deployment
# strengthens the same script with its own untracked .estate-denylist.json.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks (PG-9)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run publish gate (generic mode)
        run: bash scripts/publish-gate.sh
