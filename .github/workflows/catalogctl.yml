name: catalogctl
on:
  workflow_dispatch:
  pull_request:
    paths: ['tools/catalogctl/**', '.github/workflows/catalogctl.yml']
  push:
    branches: [main]
    paths: ['tools/catalogctl/**', '.github/workflows/catalogctl.yml']
defaults:
  run:
    working-directory: tools/catalogctl
permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/catalogctl/go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
